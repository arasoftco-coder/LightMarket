<footer class="main-footer">
  <div class="footer-container">
     <div class="footer-links">
       <a *ngFor="let link of footerLinks" [href]="link.url">{{ link.title }}</a>
     </div>
     <p class="footer-info" *ngIf="contactInfo" style="margin-top: 10px; color: #6c757d; font-size: 0.9rem;">
       {{ contactInfo }}
     </p>
     <p class="footer-copyright" style="margin-top: 15px;">
       © {{ currentYear }} لایت مارکت. تمامی حقوق محفوظ است.
     </p>
  </div>
</footer>
